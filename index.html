<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListSmart — More Views. More Bookings. More Revenue.</title>
<link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
<link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
<link href="[https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap](https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap)" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1D9E75;--teal-d:#0F6E56;--teal-l:#E1F5EE;--teal-m:#9FE1CB;
  --gold:#BA7517;--gold-l:#FAEEDA;--gold-m:#EF9F27;
  --ink:#1a1a18;--ink-m:#3a3a36;--ink-l:#6b6b62;
  --cream:#faf9f5;--white:#fff;--border:rgba(0,0,0,0.08);
  --r:12px;--r-lg:20px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:16px;line-height:1.7;overflow-x:hidden}
h1,h2,h3{font-family:'Playfair Display',serif}
#page-home{display:block}
#page-audit{display:none}
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(250,249,245,0.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--teal-d);letter-spacing:-0.02em;cursor:pointer;text-decoration:none}
.logo span{color:var(--gold)}
nav ul{list-style:none;display:flex;gap:2rem}
nav ul a{text-decoration:none;color:var(--ink-m);font-size:0.9rem;font-weight:500}
.nav-cta{background:var(--teal);color:white;padding:0.5rem 1.25rem;border-radius:100px;text-decoration:none;font-size:0.875rem;font-weight:500;cursor:pointer;border:none}
section{padding:6rem 2rem}
.container{max-width:1100px;margin:0 auto}
.btn-primary{background:var(--teal);color:white;padding:0.875rem 2rem;border-radius:100px;text-decoration:none;font-weight:500;border:none;cursor:pointer}
.audit-page{padding:5rem 1rem 3rem;min-height:100vh}
.audit-wrap{max-width:760px;margin:0 auto}
.input-card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);padding:1.75rem;margin-bottom:1.5rem}
.url-row{display:flex;gap:0.75rem}
.url-input{flex:1;padding:0.875rem 1.1rem;border-radius:var(--r);border:1.5px solid var(--border)}
.btn-audit{background:var(--teal);color:white;border:none;padding:0 1.5rem;border-radius:var(--r);cursor:pointer}
.loading{display:none;text-align:center;padding:3rem}
.result-area{display:none}
/* Minimal styles for the demo - keep your existing CSS here */
</style>
</head>
<body>

<nav>
  <a class="logo" onclick="showPage('home')">List<span>Smart</span></a>
  <ul>
    <li><a href="#services">Services</a></li>
    <li><a href="#pricing">Pricing</a></li>
  </ul>
  <button class="nav-cta" onclick="showPage('audit')">Free Audit ▶</button>
</nav>

<div id="page-home">
  <section style="padding-top:8rem">
    <div class="container">
      <h1>More Views. More Bookings.</h1>
      <button class="btn-primary" onclick="showPage('audit')">Get Free Audit</button>
    </div>
  </section>

  <section id="pricing">
    <div class="container">
      <h2>Pricing</h2>
      <form id="contactForm" style="max-width:500px; display:flex; flex-direction:column; gap:10px; margin-top:20px;">
        <input type="text" name="name" placeholder="Your Name" required style="padding:10px">
        <input type="email" name="email" placeholder="Your Email" required style="padding:10px">
        <select name="serviceType" style="padding:10px">
           <option value="Audit - €97">Starter Audit (€97)</option>
           <option value="Full Optimization - €347">Full Optimization (€347)</option>
        </select>
        <textarea name="message" placeholder="Your Listing URL or Message" style="padding:10px"></textarea>
        <button type="submit" class="btn-primary">Send Inquiry</button>
      </form>
    </div>
  </section>
</div>

<div id="page-audit" class="audit-page">
  <div class="audit-wrap">
    <div id="audit-input-card" class="input-card">
      <div class="url-row">
        <input type="text" id="airbnb-url" class="url-input" placeholder="Paste Airbnb URL here...">
        <button class="btn-audit" onclick="runAudit()">Analyze</button>
      </div>
    </div>

    <div id="audit-loading" class="loading">
      <p>Analyzing listing...</p>
    </div>

    <div id="audit-results" class="result-area">
      <h2 id="res-title"></h2>
      <p>Score: <span id="res-score"></span>/100</p>
      <button class="btn-primary" onclick="showPage('home')">Back</button>
    </div>
  </div>
</div>

<script>
function showPage(pageId) {
  document.getElementById('page-home').style.display = pageId === 'home' ? 'block' : 'none';
  document.getElementById('page-audit').style.display = pageId === 'audit' ? 'block' : 'none';
}

// 1. Fixed runAudit function
async function runAudit() {
  const url = document.getElementById('airbnb-url').value;
  if(!url) return;

  document.getElementById('audit-input-card').style.display = 'none';
  document.getElementById('audit-loading').style.display = 'block';

  try {
    const response = await fetch('/api/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await response.json();
    
    // Display results
    document.getElementById('audit-loading').style.display = 'none';
    document.getElementById('audit-results').style.display = 'block';
    document.getElementById('res-title').innerText = data.listingTitle;
    document.getElementById('res-score').innerText = data.overallScore;
  } catch (err) {
    console.error(err);
    alert("Audit failed. Check Vercel logs.");
    document.getElementById('audit-input-card').style.display = 'block';
    document.getElementById('audit-loading').style.display = 'none';
  }
}

// 2. Added Contact Form Handler
document.getElementById('contactForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.innerText = "Sending...";
  
  const formData = {
    name: e.target.name.value,
    email: e.target.email.value,
    serviceType: e.target.serviceType.value,
    message: e.target.message.value,
    isLeadOnly: true
  };

  try {
    await fetch('/api/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });
    alert("Message sent! We will contact you shortly.");
    e.target.reset();
  } catch (err) {
    alert("Error sending message.");
  } finally {
    btn.innerText = "Send Inquiry";
  }
});
</script>
</body>
</html>
